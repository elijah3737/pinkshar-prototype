<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Услуга — Pinkshar</title>
  <meta name="description" content="Услуга на Pinkshar: проверенные подрядчики с ценой, рейтингом, ближайшей датой и портфолио. Выбирайте исполнителя — оплата защищена в эскроу.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="assets/app.css?v=9">
  <style>
    /* ============================================================
       page-scoped: «Услуга-агрегатор». Префикс .uslg-* — только локальные
       довески (проверка даты, рейтинг направления, FAQ-обёртка).
       Базовые .usluga-*/.offer/.mkt-faq живут в app.css. Не переопределяю токены.
       ============================================================ */
    /* рейтинг направления в шапке услуги */
    .uslg-rate{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--ink)}
    .uslg-rate .star{color:var(--gold)}

    /* блок «Проверить дату» */
    .uslg-datecheck{display:flex;align-items:center;gap:var(--s-4);flex-wrap:wrap;
      background:var(--pink-ghost);border:1px solid var(--pink-soft);border-radius:var(--r-lg);
      padding:var(--s-4) var(--s-5);margin:var(--s-5) 0}
    .uslg-datecheck__icon{font-size:22px;line-height:1;flex:none}
    .uslg-datecheck__body{flex:1;min-width:200px}
    .uslg-datecheck__title{font-weight:700;font-size:15px;color:var(--ink)}
    .uslg-datecheck__hint{font-size:12.5px;color:var(--muted);margin-top:2px}
    .uslg-datecheck__field{display:flex;align-items:center;gap:10px;flex:none}
    .uslg-datecheck .input{height:42px;width:auto;min-width:170px}
    .uslg-datecheck__reset{background:none;border:0;color:var(--pink-strong);
      font-weight:600;font-size:13px;cursor:pointer;padding:6px 4px}
    .uslg-datecheck__reset:hover{text-decoration:underline}
    .uslg-datecheck__reset[hidden]{display:none}

    /* плашка свободно/занято на дату — внутри .offer__date */
    .uslg-avail{display:inline-flex;align-items:center;gap:5px;font-weight:600;
      border-radius:var(--r-pill);padding:2px 9px;font-size:12px;margin-left:8px}
    .uslg-avail--free{background:var(--good-soft,#e6f6ec);color:var(--good-text,#1c7a43)}
    .uslg-avail--busy{background:var(--bg);color:var(--muted)}
    /* приглушаем оффер, занятый на выбранную дату (только opacity — без сдвигов раскладки) */
    .offer.is-busy{opacity:.62}

    /* заголовок секции офферов */
    .uslg-secttl{font-family:var(--font-display);font-size:clamp(20px,2.4vw,26px);
      font-weight:700;line-height:1.15;margin:0 0 var(--s-2)}

    /* FAQ-обёртка на странице услуги */
    .uslg-faq{margin-top:var(--s-7);padding-top:var(--s-6);border-top:1px solid var(--line)}
    .uslg-faq__h{font-family:var(--font-display);font-size:clamp(20px,2.4vw,26px);
      font-weight:700;margin:0 0 var(--s-4)}

    @media (max-width:560px){
      .uslg-datecheck__field{width:100%}
      .uslg-datecheck .input{flex:1;min-width:0}
    }
  </style>
</head>
<body>
  <div data-mkt-header></div>

  <main id="view">
    <!-- Услуга-агрегатор. renderPage читает ?s= и строит список офферов подрядчиков. -->
    <div class="wrap" data-usluga-root></div>
  </main>

  <footer data-mkt-footer></footer>

  <script src="assets/data.js?v=9"></script>
  <script src="assets/shell.js?v=9"></script>
  <script>
  /* ============================================================
     УСЛУГА-АГРЕГАТОР — один экран услуги + офферы подрядчиков.
     Читает ?s=slug. Блоки: крошки → шапка услуги (название, описание,
     эскроу-плашка, рейтинг направления) → «Проверить дату» (сессионно) →
     список офферов (ядро balloons c1 — первым через PINK.offersByService) → FAQ.
     «Выбрать» → подбор типовой позиции подрядчика в корзину (drill-in) либо
     partner-profile. Всё навигацией/инлайн, без попапов.
     ============================================================ */
  window.renderPage = function () {
    var S = window.SHELL, P = window.PINK;
    var root = document.querySelector('[data-usluga-root]');
    if (!root || !S || !P) return;

    var slug = S.qparam('s');
    var svc = (P.serviceCatalog || []).find(function (s) { return s.slug === slug; });
    if (!svc) { svc = (P.serviceCatalog || [])[0]; slug = svc ? svc.slug : null; }
    if (!svc) {
      root.innerHTML =
        S.crumbs([{ label: 'Главная', href: 'index.html' }, { label: 'Услуга' }]) +
        '<div class="empty"><div class="empty__icon">🎈</div>' +
        '<div class="empty__title">Услуга не найдена</div>' +
        '<div style="margin-top:16px"><a class="btn btn--primary" href="uslugi.html">Все услуги</a></div></div>';
      return;
    }
    document.title = svc.name + ' — Pinkshar';

    var offers = S.offersByService(slug) || [];
    var escrowIcon = '<svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">' +
      '<path d="M9 1.5l6 2.2v4.1c0 3.7-2.5 6.4-6 7.7-3.5-1.3-6-4-6-7.7V3.7L9 1.5Z" stroke="currentColor" stroke-width="1.4"/>' +
      '<path d="M6.2 9l1.9 1.9L12 6.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    function ratingText(r) { return (r || 0).toFixed(1).replace('.', ','); }

    // тег направления → русский ярлык (serviceCatalog.tag: ядро|партнёр|свой)
    var TAG_LABEL = { 'ядро': 'ЯДРО Pinkshar', 'партнёр': 'Услуга подрядчика', 'свой': 'Услуга платформы' };
    var isCoreSvc = svc.tag === 'ядро';

    // рейтинг НАПРАВЛЕНИЯ — средневзвешенный по офферам (по числу отзывов).
    var dirRating = null, dirReviews = 0;
    if (offers.length) {
      var wSum = 0, rwSum = 0;
      offers.forEach(function (o) {
        var w = (o.reviewsCount || 0) || 1;
        wSum += w; rwSum += (o.rating || 0) * w; dirReviews += (o.reviewsCount || 0);
      });
      dirRating = wSum ? rwSum / wSum : null;
    }

    var crumbs = S.crumbs([
      { label: 'Главная', href: 'index.html' },
      { label: 'Услуги', href: 'uslugi.html' },
      { label: svc.name }
    ]);

    var head =
      '<div class="usluga-head">' +
        '<div class="usluga-head__emoji" aria-hidden="true">' + S.esc(svc.emoji || '🎈') + '</div>' +
        '<div class="usluga-head__body">' +
          (svc.tag ? '<span class="' + (isCoreSvc ? 'tag-core' : 'tag-agg') + '" style="margin-bottom:8px;display:inline-block">' +
            S.esc(TAG_LABEL[svc.tag] || svc.tag) + '</span>' : '') +
          '<h1>' + S.esc(svc.name) + '</h1>' +
          '<p class="usluga-head__desc">' + S.esc(svc.desc || '') + '</p>' +
          '<div class="usluga-head__metarow">' +
            (dirRating != null
              ? '<span class="uslg-rate"><span class="star">★</span> ' + ratingText(dirRating) +
                ' <span style="color:var(--muted);font-weight:400">· ' + dirReviews + ' отзывов направления</span></span>' +
                '<span>·</span>'
              : '') +
            '<span>' + escrowIcon + ' Оплата в эскроу до выполнения</span>' +
            '<span>·</span><span>Проверенные подрядчики</span>' +
            '<span>·</span><span>от ' + S.money(svc.priceFrom) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';

    /* ---- «Проверить дату»: сессионно (sessionStorage), без перезагрузки ---- */
    var DATE_KEY = 'pinkshar_eventdate';
    function readDate() { try { return sessionStorage.getItem(DATE_KEY) || ''; } catch (e) { return ''; } }
    function writeDate(v) { try { v ? sessionStorage.setItem(DATE_KEY, v) : sessionStorage.removeItem(DATE_KEY); } catch (e) {} }
    var minDate = '2026-06-23';
    var dateCheck =
      '<div class="uslg-datecheck">' +
        '<span class="uslg-datecheck__icon" aria-hidden="true">📅</span>' +
        '<div class="uslg-datecheck__body">' +
          '<div class="uslg-datecheck__title">Проверьте дату праздника</div>' +
          '<div class="uslg-datecheck__hint">Подсветим подрядчиков, свободных к вашей дате. Сохраняется на время визита.</div>' +
        '</div>' +
        '<div class="uslg-datecheck__field">' +
          '<input class="input" type="date" min="' + minDate + '" data-date-input aria-label="Дата праздника">' +
          '<button type="button" class="uslg-datecheck__reset" data-date-reset hidden>Сбросить</button>' +
        '</div>' +
      '</div>';

    /* один оффер. avail: null = дата не выбрана; true/false = свободен к дате */
    function offerCard(o) {
      var c = S.contractorById(o.contractorId) || {};
      var portfolio = (o.portfolioPhotos || []).map(function (src) {
        return '<span class="offer__thumb"><img src="' + S.esc(src) + '" alt="" loading="lazy" ' +
          "onerror=\"this.closest('.offer__thumb').style.display='none'\"></span>";
      }).join('');
      return '<article class="offer' + (o.isCore ? ' offer--core' : '') + '" data-offer data-nearest="' + S.esc(o.nearestDate || '') + '">' +
        '<div class="offer__partner">' +
          '<span class="avatar avatar--plum avatar--lg">' + S.esc(S.initials(c.name)) + '</span>' +
          '<div class="offer__id">' +
            '<div class="offer__name">' +
              '<a href="' + S.partnerHref(c.id) + '">' + S.esc(c.name || 'Подрядчик') + '</a>' +
              (o.isCore ? '<span class="offer__core-badge">Студия Pinkshar</span>' : '') +
            '</div>' +
            '<div class="offer__sub"><span class="offer__rating">★ ' + ratingText(o.rating) + '</span> · ' +
              (o.reviewsCount || 0) + ' отзывов · ' + (c.orders || 0) + ' заказов</div>' +
            '<p class="offer__blurb">' + S.esc(o.blurb || '') + '</p>' +
            '<div class="offer__date">📅 Ближайшая свободная: <b>' + S.dateShort(o.nearestDate) + '</b>' +
              '<span class="uslg-avail" data-avail hidden></span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="offer__portfolio">' + portfolio + '</div>' +
        '<div class="offer__buy">' +
          '<div class="offer__price">' +
            '<span class="offer__from">от</span>' +
            '<span class="offer__amount">' + S.money(o.priceFrom) + '</span>' +
            '<span class="offer__unit">' + S.esc(o.unit || '') + '</span>' +
          '</div>' +
          '<button class="btn btn--primary" data-pick="' + S.esc(o.contractorId) + '">Выбрать</button>' +
        '</div>' +
      '</article>';
    }

    var offersHTML = offers.length
      ? '<h2 class="uslg-secttl">Подрядчики, готовые взять заказ</h2>' +
        '<p class="usluga-offers__cap"><strong>' + offers.length + '</strong> ' +
          (offers.length === 1 ? 'подрядчик' : (offers.length < 5 ? 'подрядчика' : 'подрядчиков')) +
          ' · отсортированы по рейтингу' + (isCoreSvc ? ', ядро Pinkshar первым' : '') + '</p>' +
        '<div class="offers">' + offers.map(offerCard).join('') + '</div>'
      : '<div class="empty"><div class="empty__icon">🔍</div><div class="empty__title">Пока нет офферов</div>' +
        '<p>Откройте каталог позиций этой услуги.</p>' +
        '<div style="margin-top:16px"><a class="btn btn--primary" href="' + S.uslugiHref(slug) + '">Смотреть позиции</a></div></div>';

    /* ---- FAQ (общий для услуги; используется аккордеон S.initFaq из shell.js) ---- */
    var faqItems = [
      { q: 'Как формируется один чек на разных подрядчиков?',
        a: 'Pinkshar собирает оплату в эскроу и сам распределяет выплаты исполнителям после выполнения. Вы платите один раз и за весь праздник сразу.' },
      { q: 'Что если подрядчик подведёт?',
        a: 'Деньги придерживаются в эскроу до подтверждения выполнения. Если что-то пошло не так — возврат или замена исполнителя за счёт площадки.' },
      { q: 'Можно добавить эту услугу к шарам в один заказ?',
        a: 'Да. Шары — ядро Pinkshar, вокруг них собирается весь праздник. Нажмите «Выбрать» — позиция уйдёт в общую корзину, дату и адрес укажете один раз на оформлении.' },
      { q: 'Цена «от» — это финальная сумма?',
        a: 'Это стартовая цена за базовый объём. Точную стоимость подрядчик подтверждает под ваш сценарий до оплаты — переплат «по факту» в эскроу-сделке нет.' }
    ];
    var faqHTML =
      '<section class="uslg-faq">' +
        '<h2 class="uslg-faq__h">Частые вопросы</h2>' +
        '<div class="mkt-faq">' +
          faqItems.map(function (it) {
            return '<div class="mkt-faq__item">' +
              '<button type="button" class="mkt-faq__q">' + S.esc(it.q) +
                '<span class="mkt-faq__icon" aria-hidden="true"></span></button>' +
              '<div class="mkt-faq__a"><div class="mkt-faq__a-inner">' + S.esc(it.a) + '</div></div>' +
            '</div>';
          }).join('') +
        '</div>' +
      '</section>';

    root.innerHTML = crumbs + head + dateCheck + offersHTML +
      '<div style="margin-top:24px"><a class="btn btn--ghost" href="' + S.uslugiHref(slug) + '">Все позиции категории «' + S.esc(svc.name) + '» →</a></div>' +
      faqHTML;

    // FAQ-аккордеон навешивает сам shell.js: init() вызывает initFaq(document)
    // ПОСЛЕ renderPage(). Повторно здесь НЕ биндим — иначе двойной toggle гасит открытие.

    /* ---- логика «Проверить дату»: подсветка свободно/занято по nearestDate ---- */
    var dateInput = root.querySelector('[data-date-input]');
    var dateReset = root.querySelector('[data-date-reset]');
    function applyDate(v) {
      var has = !!v;
      if (dateReset) dateReset.hidden = !has;
      root.querySelectorAll('[data-offer]').forEach(function (card) {
        var availEl = card.querySelector('[data-avail]');
        if (!availEl) return;
        if (!has) {
          availEl.hidden = true; availEl.className = 'uslg-avail';
          card.classList.remove('is-busy');
          return;
        }
        var nearest = card.getAttribute('data-nearest') || '';
        var free = nearest && nearest <= v; // ISO-строки сравнимы лексикографически
        availEl.hidden = false;
        availEl.className = 'uslg-avail ' + (free ? 'uslg-avail--free' : 'uslg-avail--busy');
        availEl.textContent = free ? '✓ свободно на эту дату' : 'занято — ближайшая раньше';
        card.classList.toggle('is-busy', !free);
      });
    }
    if (dateInput) {
      var saved = readDate();
      if (saved) dateInput.value = saved;
      applyDate(saved);
      dateInput.addEventListener('change', function () {
        writeDate(dateInput.value);
        applyDate(dateInput.value);
      });
    }
    if (dateReset) dateReset.addEventListener('click', function () {
      writeDate(''); if (dateInput) dateInput.value = ''; applyDate('');
    });

    /* «Выбрать» — добавляет типовую позицию подрядчика этой категории в корзину (drill-in) */
    root.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-pick]');
      if (!btn) return;
      var cid = btn.getAttribute('data-pick');
      var prod = (P.productsByCategory(slug) || []).find(function (p) { return p.contractorId === cid; })
              || (P.productsByCategory(slug) || [])[0];
      if (prod) {
        S.addToCart(prod.id, 1);
        var lbl = btn.textContent;
        btn.textContent = 'Добавлено ✓'; btn.classList.add('btn--soft'); btn.classList.remove('btn--primary');
        setTimeout(function () { btn.textContent = lbl; btn.classList.add('btn--primary'); btn.classList.remove('btn--soft'); }, 1600);
      } else {
        location.href = S.partnerHref(cid);
      }
    });
  };
  </script>
</body>
</html>
