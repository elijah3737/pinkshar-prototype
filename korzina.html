<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Корзина — Pinkshar</title>
  <meta name="description" content="Корзина Pinkshar: весь праздник в один чек. Позиции разных подрядчиков, доставка и монтаж, итог. Оплата заморожена в эскроу до выполнения.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="assets/app.css?v=9">
</head>
<body>
  <div data-mkt-header></div>

  <main id="view">
    <!-- Мультивендорная корзина. renderPage строит из S.cartItems(). -->
    <div class="wrap page" data-cart-root></div>
  </main>

  <footer data-mkt-footer></footer>

  <script src="assets/data.js?v=9"></script>
  <script src="assets/shell.js?v=9"></script>
  <script>
  /* ============================================================
     КОРЗИНА — мультивендорная. Группирует S.cartItems() по подрядчику.
     qty-контролы → S.cartSetQty. Доставка/монтаж — отдельной строкой.
     Итог → S.cartTotal + доставка. Эскроу-плашка. Без попапов.
     Перерисовывается inline после каждого изменения количества.
     ============================================================ */
  window.renderPage = function () {
    var S = window.SHELL, P = window.PINK;
    var root = document.querySelector('[data-cart-root]');
    if (!root || !S) return;

    var DELIVERY = 700;   // доставка/монтаж — фикс демо-строка
    var escrowIcon = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">' +
      '<path d="M9 1.5l6 2.2v4.1c0 3.7-2.5 6.4-6 7.7-3.5-1.3-6-4-6-7.7V3.7L9 1.5Z" stroke="currentColor" stroke-width="1.4"/>' +
      '<path d="M6.2 9l1.9 1.9L12 6.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function draw() {
      var items = S.cartItems().filter(function (it) { return it.product; });
      var crumbs = S.crumbs([{ label: 'Главная', href: 'index.html' }, { label: 'Корзина' }]);

      if (!items.length) {
        root.innerHTML = crumbs +
          '<div class="empty"><div class="empty__icon">🛒</div>' +
          '<div class="empty__title">Корзина пуста</div>' +
          '<p>Соберите праздник: выберите пакет или добавьте услуги по отдельности.</p>' +
          '<div style="margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">' +
            '<a class="btn btn--primary" href="pakety.html">Готовые пакеты</a>' +
            '<a class="btn btn--ghost" href="uslugi.html">Все услуги</a></div></div>';
        return;
      }

      /* группировка по подрядчику */
      var groups = {};
      items.forEach(function (it) {
        var key = it.contractor ? it.contractor.id : 'platform';
        if (!groups[key]) groups[key] = { contractor: it.contractor, lines: [] };
        groups[key].lines.push(it);
      });

      function lineHTML(it) {
        var p = it.product;
        var ph = (p.photos && p.photos[0]) || '';
        var svc = (P.serviceCatalog || []).find(function (s) { return s.slug === p.categorySlug; }) || {};
        return '<div class="cart-line" data-id="' + S.esc(it.id) + '">' +
          '<span class="cart-line__media' + (ph ? '' : ' cart-line__media--fallback') + '" data-emoji="' + S.esc(svc.emoji || '🎈') + '">' +
            '<img src="' + S.esc(ph) + '" alt="" loading="lazy" onerror="this.closest(\'.cart-line__media\').classList.add(\'cart-line__media--fallback\')"></span>' +
          '<div class="cart-line__body">' +
            '<div class="cart-line__name"><a href="' + S.tovarHref(p.id) + '">' + S.esc(p.name) + '</a></div>' +
            '<div class="cart-line__unit">' + S.esc(svc.name || '') + ' · ' + S.money(it.price) + ' / шт</div>' +
          '</div>' +
          '<div class="cart-line__right">' +
            '<div class="qty">' +
              '<button class="qty__btn" data-dec="' + S.esc(it.id) + '" aria-label="Меньше"' + (it.qty <= 1 ? '' : '') + '>−</button>' +
              '<span class="qty__val">' + it.qty + '</span>' +
              '<button class="qty__btn" data-inc="' + S.esc(it.id) + '" aria-label="Больше">+</button>' +
            '</div>' +
            '<div class="cart-line__price">' + S.money(it.lineTotal) + '</div>' +
            '<button class="cart-line__remove" data-rm="' + S.esc(it.id) + '">Убрать</button>' +
          '</div>' +
        '</div>';
      }

      var vendorsHTML = Object.keys(groups).map(function (key) {
        var g = groups[key];
        var c = g.contractor;
        var vendorSum = g.lines.reduce(function (s, it) { return s + it.lineTotal; }, 0);
        return '<div class="cart-vendor">' +
          '<div class="cart-vendor__head">' +
            '<span class="avatar avatar--plum avatar--sm">' + S.esc(S.initials(c ? c.name : 'Pinkshar')) + '</span>' +
            '<span class="cart-vendor__name">' + (c ? '<a href="' + S.partnerHref(c.id) + '">' + S.esc(c.name) + '</a>' : 'Pinkshar') + '</span>' +
            '<span class="cart-vendor__sub">' + g.lines.length + ' поз. · ' + S.money(vendorSum) + '</span>' +
          '</div>' +
          g.lines.map(lineHTML).join('') +
        '</div>';
      }).join('');

      var goods = S.cartTotal();
      var total = goods + DELIVERY;

      var savedDate = '';
      try { savedDate = sessionStorage.getItem('pinkshar_date') || ''; } catch (e) {}

      var summary =
        '<aside class="cart-summary">' +
          '<div class="cart-summary__title">Итог заказа</div>' +
          '<div class="cart-summary__row"><span>Позиции · ' + items.length + '</span><span class="v">' + S.money(goods) + '</span></div>' +
          '<div class="cart-summary__row"><span>Доставка и монтаж</span><span class="v">' + S.money(DELIVERY) + '</span></div>' +
          '<div class="cart-summary__total"><span class="l">К оплате</span><span class="v">' + S.money(total) + '</span></div>' +
          '<div class="field" style="margin:14px 0 6px">' +
            '<label for="cart-date">Дата праздника</label>' +
            '<input class="input" type="date" id="cart-date" data-cart-date min="2026-06-23" value="' + S.esc(savedDate) + '">' +
            '<span class="hint">Сохраним и подставим на оформлении</span>' +
          '</div>' +
          '<a class="btn btn--primary btn--lg btn--block" href="checkout.html" style="margin-top:8px">Оформить заказ</a>' +
          '<button class="btn btn--ghost btn--block" data-clear>Очистить корзину</button>' +
          '<div class="cart-escrow">' + escrowIcon +
            '<span>Оплата замораживается в эскроу и удерживается до выполнения. Если подрядчик подведёт — вернём деньги.</span></div>' +
        '</aside>';

      root.innerHTML = crumbs +
        '<h1 class="serif" style="font-size:30px;margin:8px 0 20px">Корзина · весь праздник в один чек</h1>' +
        '<div class="cart"><div class="cart__main">' + vendorsHTML +
          '<div class="cart-vendor"><div class="cart-extra"><span>Доставка и монтаж по Москве</span><span class="cart-extra__val">' + S.money(DELIVERY) + '</span></div></div>' +
        '</div>' + summary + '</div>';
    }

    /* делегирование: qty / remove / clear → перерисовка */
    root.addEventListener('click', function (e) {
      var inc = e.target.closest('[data-inc]');
      var dec = e.target.closest('[data-dec]');
      var rm = e.target.closest('[data-rm]');
      var clear = e.target.closest('[data-clear]');
      if (inc) { var id = inc.getAttribute('data-inc'); var c = S.cartItems().find(function (x) { return x.id === id; }); S.cartSetQty(id, (c ? c.qty : 1) + 1); draw(); }
      else if (dec) { var id2 = dec.getAttribute('data-dec'); var c2 = S.cartItems().find(function (x) { return x.id === id2; }); S.cartSetQty(id2, (c2 ? c2.qty : 1) - 1); draw(); }
      else if (rm) { S.cartSetQty(rm.getAttribute('data-rm'), 0); draw(); }
      else if (clear) { S.cartClear(); draw(); }
    });

    /* дата праздника — сессионно (подхватится на чекауте). Без перерисовки. */
    root.addEventListener('change', function (e) {
      var d = e.target.closest('[data-cart-date]');
      if (d) { try { sessionStorage.setItem('pinkshar_date', d.value || ''); } catch (err) {} }
    });

    draw();
  };
  </script>
</body>
</html>
